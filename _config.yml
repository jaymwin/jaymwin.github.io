# --- General options --- #
# port: 4000
# host: 127.0.0.1
# To run in jekyll: bundle exec jekyll serve
# and go to http://127.0.0.1:4000/

# If you are building a GitHub project page:
#url: "http://username.github.io/projectname"
#baseurl: "/projectname"

# Name of website
title: Jay Winiarski
bigimg: "/img/zion.jpg"

# Short description of your site
url: "http://jaymwin.github.io"
baseurl: ""
description: PhD Student - Ecology, Evolution, & Behavior


# --- Navigation bar options --- #

# List of links in the navigation bar
navbar-links:
  About Me:
    - Bio: "aboutme"
    - CV: "cv"
  Research:
    - American Kestrel Phenology: "amke_project"
    - Bachman's Sparrow Breeding Ecology: "bacs_project"
  Maps:
    - Kestrel Trapping Locations: "trapping_map.html"
    - Kestrel Satellite Telemetry: "tracking_map.html"
  Additional Info:
    - Kestrel Full Cycle Phenology Project: "https://fullcyclephenology.com/"
    - Heath Lab: "https://biology.boisestate.edu/gcebirds/"

# Image to show in the navigation bar - image must be a square (width = height)
# Remove this parameter if you don't want an image in the navbar
avatar: "/img/circle_pic.jpg"

# --- Footer options --- #

# Change all these values or delete the ones you don't want.
# Important: you must keep the "name" parameter, everything else you can remove
author:
  name: Jay Winiarski
  email: "jmwiniarski@gmail.com"
  facebook: yourname  # eg. daattali
  github: jaymwin
  twitter: jmwiniar
  linkedin: yourlink  # eg. "pub/dean-attali/8/946/143"
  stackoverflow: yourlink  # eg. "3943160/daattali"



# Select which links to show in the footer
footer-links-active:
  rss: true
  facebook: false
  email: true
  twitter: true
  github: true
  linkedin: false
  stackoverflow: false

# How to display the link to the website in the footer
# Remove this if you don't want a link in the footer
url-pretty: "jaymwin.github.io"

# --- Misc --- #

# Fill in your Disqus shortname (NOT the userid) if you want to support Disqus comments
disqus: "jaymwin-github-io"

# Fill in your Google Analytics ID to track your website using GA
google_analytics: #"UA-87260839-1"
# old through gmail "UA-80552998-1"

# --- Don't need to touch anything below here (but you can if you want) --- #

# Output options (more information on Jekyll's site)
timezone: "America/Vancouver"
markdown: kramdown
highlighter: rouge
permalink: /:year-:month-:day-:title/
paginate: 5

kramdown:
  input: GFM

# Default YAML values (more information on Jekyll's site)
defaults:
  -
    scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      comments: true  # add comments to all blog posts
  -
    scope:
      path: "" # all files
    values:
      layout: "page"
      show-avatar: true

# Exclude these files from production site
exclude:
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - README.md
  - CNAME
  - Vagrantfile
  - .DS_Store

# prose.io config
prose:
  rooturl: '_posts'
  media: 'img'
  ignore:
    - 404.html
    - LICENSE
    - feed.xml
    - _config.yml
    - /_layouts
    - /_includes
    - /css
    - /img
    - /js
  metadata:
    _posts:
      - name: "layout"
        field:
          element: "hidden"
          value: "post"
      - name: "title"
        field:
          element: "text"
          label: "Post title"
          placeholder: "Title"
          alterable: true
      - name: "subtitle"
        field:
          element: "textarea"
          label: "Subtitle"
          placeholder: "A description of your post."
          alterable: true
      - name: "date"
        field:
          element: "text"
          label: "Date"
          help: "Enter date of post."
          placeholder: "yyyy-mm-dd"
          alterable: true
      - name: "published"
        field:
          element: "checkbox"
          label: "Publish"
          help: "Check to publish post, uncheck to hide."

gems:
  - jekyll-paginate

